# LiteLLM Proxy configuration
# All models route through OpenRouter as the sole provider.

model_list:
  - model_name: z-ai/glm-5.1
    litellm_params:
      model: openrouter/z-ai/glm-5.1
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
